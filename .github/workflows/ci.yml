name: CI

on: [push, workflow_dispatch]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: tempconverter
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s --health-timeout=5s --health-retries=10

    env:
      DB_USER: appuser
      DB_PASS: apppass
      DB_HOST: 127.0.0.1
      DB_NAME: tempconverter
      STUDENT: "Luka Petrecija"
      COLLEGE: "Algebra Bernays University"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/test_unit.py -v

      - name: Wait for the database to be ready
        run: |
          sudo apt-get update && sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -uappuser -papppass -e "SELECT 1" tempconverter >/dev/null 2>&1; then
              echo "MySQL ready"; exit 0
            fi
            echo "waiting for mysql ($i)..."; sleep 3
          done
          echo "MySQL did not become ready in time"; exit 1

      - name: Run integration tests
        run: pytest tests/test_integration.py -v

      - name: Build container image
        run: docker build -t tempconverter:ci .
